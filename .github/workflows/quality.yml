name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: read-only repo access only.
permissions:
  contents: read

# Cancel superseded runs on the same PR branch to save runner minutes.
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lighthouse, Axe a11y, JSON-LD, robots, sitemap, links
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Hard gate: any HIGH advisory fails the run.
      # All previously-known HIGH advisories were resolved by run-3 (pa11y-ci removed,
      # replaced by @axe-core/playwright with a clean dep tree).
      - name: Dependency audit (npm audit --audit-level=high)
        run: npm audit --audit-level=high

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start server
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Lighthouse CI
        run: npm run lhci

      - name: Lighthouse CI (mobile — SEO-critical, Google mobile-first)
        run: npm run lhci:mobile

      - name: Axe accessibility scan (WCAG2AA via Playwright)
        run: npm run test:a11y

      - name: Validate structured data (JSON-LD)
        run: npm run validate:structured-data

      - name: Validate robots.txt
        run: npm run validate:robots

      - name: Validate sitemap.xml
        run: npm run validate:sitemap

      # Scans source files (TSX + Markdown) for dead links.
      # lychee is a Rust binary invoked via the official action — no npm install needed.
      # localhost URLs are excluded via .lychee.toml.
      - name: Broken-link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-mail
            --max-concurrency 4
            --config .lychee.toml
            'src/**/*.tsx'
            '*.md'
            'README.md'
          fail: true

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start server
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
